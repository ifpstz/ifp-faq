name: Deploy MkDocs + Decap CMS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1️⃣ Repo auschecken
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Python einrichten
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3️⃣ Abhängigkeiten installieren
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocs-awesome-pages-plugin

      # 4️⃣ Drafts filtern
      - name: Filter Drafts
        run: |
          # Alles auf einmal kopieren
          cp -r docs docs_tmp

          # Nur Draft-MDs wieder entfernen
          find docs_tmp -type f -name "*.md" ! -path "docs_tmp/admin/*" | while read f; do
            if grep -q "draft: true" "$f"; then
              rm "$f"
            fi
          done

          # Backup und Ersetzen
          mv docs docs_backup
          mv docs_tmp docs

      # 5️⃣ MkDocs bauen (inkl. Admin-Panel kopieren)
      - name: Build MkDocs
        run: |
          mkdocs build
          cp -r docs/admin site/

      # 6️⃣ Original docs wiederherstellen
      - name: Restore Docs
        run: mv docs_backup docs

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # MkDocs erstellt standardmäßig den Ordner 'site'
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
