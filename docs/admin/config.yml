backend:
  name: github
  repo: ifpstz/ifp-faq
  branch: main

media_folder: "docs/images"
public_folder: "/images"

collections:
  - name: "raumprogramm"
    label: "Raumprogramm"
    folder: "docs/raumprogramm"
    extension: "md"
    format: "frontmatter"
    create: true
#    path: "{{file_path}}" 
    summary: "{{title}} — Status: {{draft}}"
    fields:
#      - { label: "Ordner / URL-Name", name: "slug", widget: "string", hint: "Beispiel: Oberkategorie/Thema" }
      - { label: "Titel", name: "title", widget: "string" }
      # FEATURE: Hero Bild
      - { label: "Bild", name: "image", widget: "image", required: false}
      # FEATURE: Sortierung (wird als 'order' im Frontmatter gespeichert)
      - { label: "Sortierung (niedrig = oben)", name: "order", widget: "number", default: 10, required: false }
      # FEATURE: Entwurf-Status
      - { label: "Entwurf", name: "draft", widget: "boolean", default: true }
      - { label: "Inhalt", name: "body", widget: "markdown" }

  - name: "ressourcen"
    label: "Ressourcen"
    folder: "docs/ressourcen"
    extension: "md"
    format: "frontmatter"
    create: true
#    path: "{{file_path}}" 
    summary: "{{title}} — Status: {{draft}}"
    fields:
#      - { label: "Ordner / URL-Name", name: "slug", widget: "string", hint: "Beispiel: Oberkategorie/Thema" }
      - { label: "Titel", name: "title", widget: "string" }
      # FEATURE: Hero Bild
      - { label: "Bild", name: "image", widget: "image", required: false}
      # FEATURE: Sortierung (wird als 'order' im Frontmatter gespeichert)
      - { label: "Sortierung (niedrig = oben)", name: "order", widget: "number", default: 10, required: false }
      # FEATURE: Entwurf-Status
      - { label: "Entwurf", name: "draft", widget: "boolean", default: true }
      - { label: "Inhalt", name: "body", widget: "markdown" }

  - name: "wegweiser"
    label: "Wegweiser"
    folder: "docs/wegweiser"
    extension: "md"
    format: "frontmatter"
    create: true
#    path: "{{file_path}}" 
    summary: "{{title}} — Status: {{draft}}"
    fields:
#      - { label: "Ordner / URL-Name", name: "slug", widget: "string", hint: "Beispiel: Oberkategorie/Thema" }
      - { label: "Titel", name: "title", widget: "string" }
      # FEATURE: Hero Bild
      - { label: "Bild", name: "image", widget: "image", required: false}
      # FEATURE: Sortierung (wird als 'order' im Frontmatter gespeichert)
      - { label: "Sortierung (niedrig = oben)", name: "order", widget: "number", default: 10, required: false }
      # FEATURE: Entwurf-Status
      - { label: "Entwurf", name: "draft", widget: "boolean", default: true }
      - { label: "Inhalt", name: "body", widget: "markdown" }

  - name: "post"
    label: "Blog"
    folder: "docs/blog"
    path: "{{slug}}/index"
    create: true
    fields:
      - {label: "Titel", name: "title", widget: "string"}
      - {label: "Veröffentlichungsdatum", name: "date", widget: "datetime"}
      - {label: "Sortierung", name: "order", widget: "number", default: 10, required: false}
      - {label: "Entwurf", name: "draft", widget: "boolean", default: false}
      - {label: "Beschreibung", name: "description", widget: "text"}
      - {label: "Bild", name: "image", widget: "image", required: false}
      - {label: "Inhalt", name: "body", widget: "markdown"}
